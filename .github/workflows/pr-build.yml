name: Build & Diff PR System

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_CACHE_URL: ${{ secrets.ATTIC_CACHE_URL }}
  ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}

jobs:
  eval:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: BrightFalls
            os: ubuntu-latest
            system_attr: nixosConfigurations
          - host: Nexus
            os: ubuntu-latest
            system_attr: nixosConfigurations
          - host: CauldronLake
            os: ubuntu-latest
            system_attr: nixosConfigurations
          - host: WorkLaptop
            os: macos-latest
            system_attr: darwinConfigurations
          - host: NightSprings
            os: macos-latest
            system_attr: darwinConfigurations

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Evaluate configuration
        run: |
          nix eval ".#${{ matrix.system_attr }}.${{ matrix.host }}.config.system.build.toplevel.drvPath" --raw

  pr-build:
    needs: [eval]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - host: BrightFalls
            platform: x86_64-linux
            os: ubuntu-latest
            system_attr: nixosConfigurations
            build_attr: config.system.build.toplevel
          - host: Nexus
            platform: x86_64-linux
            os: ubuntu-latest
            system_attr: nixosConfigurations
            build_attr: config.system.build.toplevel
          - host: CauldronLake
            platform: x86_64-linux
            os: ubuntu-latest
            system_attr: nixosConfigurations
            build_attr: config.system.build.toplevel
          - host: WorkLaptop
            platform: aarch64-darwin
            os: macos-latest
            system_attr: darwinConfigurations
            build_attr: config.system.build.toplevel
          - host: NightSprings
            platform: aarch64-darwin
            os: macos-latest
            system_attr: darwinConfigurations
            build_attr: config.system.build.toplevel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: wimpysworld/nothing-but-nix@v10
        if: ${{ matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm' }}
        with:
          hatchet-protocol: "rampage"
          witness-carnage: true
          nix-permission-edict: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            keep-outputs = true
            ${{ runner.os == 'Linux' && 'build-dir = /nix/build' || '' }}

      - name: Configure Attic cache
        run: |
          nix run nixpkgs#attic-client -- login \
            nexus "${{ env.ATTIC_CACHE_URL }}" "${{ env.ATTIC_TOKEN }}"
          nix run nixpkgs#attic-client -- use main

      - name: Build latest configuration
        run: |
          nix build "github:matteo-pacini/nixos-configs#${{ matrix.system_attr }}.${{ matrix.host }}.${{ matrix.build_attr }}" --out-link ./old-result --fallback

      - name: Build new configuration
        run: |
          nix build ".#${{ matrix.system_attr }}.${{ matrix.host }}.${{ matrix.build_attr }}" --out-link ./result --fallback

      - name: Compare configurations
        run: |

          echo "## Diff" >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          # Pinned to v1.4.2: dix HEAD fails to build because libsqlite3-sys
          # 0.38.0 (pulled in 2026-05-27) uses the unstable cfg_select! macro.
          nix run github:faukah/dix/v1.4.2 -- ./old-result ./result >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
