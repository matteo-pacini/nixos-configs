name: nexus-n8n

services:

  postgres:
    image: postgres:16.13
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_DB=n8n
    volumes:
      - /var/lib/postgresql_n8n:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U user -d n8n']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.15.0
    restart: always
    environment:
      - N8N_HOST=n8n.matteopacini.me
      - WEBHOOK_URL=https://n8n.matteopacini.me
      - N8N_SECURE_COOKIE=true
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PROXY_HOPS=1
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=
      - NODE_FUNCTION_ALLOW_BUILTIN=
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/London
      - TZ=Europe/London
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=user
    ports:
      # localhost only: Caddy + fail2ban front everything
      - 127.0.0.1:5678:5678
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    links:
      - postgres
    volumes:
      - /var/lib/n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      # Split-horizon DNS for local services (container can't rely on CNAME resolution)
      - "gateway.matteopacini.me:192.168.10.14"
      - "home.matteopacini.me:192.168.10.14"
      - "n8n.matteopacini.me:192.168.10.14"
      - "jellyfin.matteopacini.me:192.168.10.14"

